<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APEX ESPORTS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow: hidden;
}

/* ================= CINEMATIC INTRO ================= */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.intro-bg {
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 40%);
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translate(0,0); }
  50% { transform: translate(-5%,-5%); }
  100% { transform: translate(0,0); }
}

.intro-content {
  text-align: center;
  z-index: 2;
}

.intro-logo {
  font-size: 90px;
  letter-spacing: 15px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px rgba(255,255,255,0.1); }
  to { text-shadow: 0 0 40px rgba(255,255,255,0.5); }
}

#intro button {
  padding: 12px 20px;
  margin-top: 20px;
  background: white;
  border: none;
  cursor: pointer;
}

/* ================= BACKGROUND ================= */
.bg {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 40%),
              radial-gradient(circle at 80% 80%, rgba(255,255,255,0.05), transparent 40%);
  animation: move 12s linear infinite;
  z-index: -1;
}

@keyframes move {
  0% { transform: translate(0,0); }
  50% { transform: translate(-10%,-10%); }
  100% { transform: translate(0,0); }
}

/* ================= LAYOUT ================= */
.lobby {
  display: flex;
  height: 100vh;
}

/* MENU */
.menu {
  width: 240px;
  background: rgba(255,255,255,0.03);
  border-right: 1px solid rgba(255,255,255,0.1);
  padding: 20px;
}

.brand {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 20px;
}

.menu button {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
}

/* SCREEN */
.screen {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* PAGES */
.page { display: none; }
.page.active { display: block; }

/* TITLE */
.title {
  font-size: 80px;
  letter-spacing: 10px;
}

/* INPUTS */
input, select, textarea {
  display: block;
  margin: 8px auto;
  padding: 10px;
  width: 260px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
}

/* BUTTON */
button {
  padding: 10px 15px;
  margin-top: 10px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
}

/* CARDS */
.card {
  border: 1px solid rgba(255,255,255,0.1);
  padding: 15px;
  margin: 10px;
}
</style>

</head>

<body>

<!-- CINEMATIC INTRO -->
<div id="intro">
  <div class="intro-bg"></div>
  <div class="intro-content">
    <h1 class="intro-logo">APEX</h1>
    <p>ESPORTS ORGANIZATION</p>
    <button onclick="enterSite()">CLICK TO ENTER</button>
  </div>
</div>

<div class="bg"></div>

<div class="lobby">

  <!-- MENU -->
  <div class="menu">
    <div class="brand">▲ APEX</div>

    <button onclick="show('home')">HOME</button>
    <button onclick="show('about')">ABOUT</button>
    <button onclick="show('apply')">APPLY</button>
    <button onclick="show('pro')">PRO</button>
    <button onclick="show('dash')">DASHBOARD</button>
  </div>

  <!-- SCREEN -->
  <div class="screen">

    <!-- HOME -->
    <section id="home" class="page active">
      <h1 class="title">APEX</h1>
      <p>ESPORTS ORG</p>

      <div class="card">
        <h3>LIVE MEMBERS</h3>
        <h1 id="members">30</h1>
      </div>
    </section>

    <!-- ABOUT -->
    <section id="about" class="page">
      <h2>ABOUT APEX</h2>
      <p>Free coaching, giveaways, Build & Zero Build support.</p>
    </section>

    <!-- APPLY -->
    <section id="apply" class="page">

      <h2>APPLICATION</h2>

      <input id="discord" placeholder="Discord">
      <input id="epic" placeholder="Epic">
      <input id="age" placeholder="Age">
      <input id="region" placeholder="Region">

      <select id="rank">
        <option>Rank</option>
        <option>Bronze</option>
        <option>Silver</option>
        <option>Gold</option>
        <option>Platinum</option>
        <option>Diamond</option>
        <option>Champion</option>
        <option>Unreal</option>
      </select>

      <textarea id="reason" placeholder="Why join APEX?"></textarea>

      <button onclick="submitApp()">SUBMIT</button>

    </section>

    <!-- PRO -->
    <section id="pro" class="page">

      <h2>PRO TRYOUTS</h2>

      <input id="pdisc" placeholder="Discord">
      <input id="pepic" placeholder="Epic">
      <input id="clip" placeholder="CLIP REQUIRED">

      <button onclick="submitPro()">SUBMIT PRO</button>

    </section>

    <!-- DASHBOARD -->
    <section id="dash" class="page">
      <h2>ORG DASHBOARD</h2>

      <div class="card">
        <h3>Members</h3>
        <h1 id="m2">30</h1>
      </div>

      <div class="card">
        <h3>Applications</h3>
        <h1>30</h1>
      </div>

      <div class="card">
        <h3>Coaches</h3>
        <h1>1</h1>
      </div>

    </section>

  </div>
</div>

<script>

const WEBHOOK = "PASTE_WEBHOOK_HERE";

/* INTRO */
function enterSite(){
  document.getElementById("intro").style.display = "none";
}

/* NAV */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* LIVE COUNTER */
let members = 30;

setInterval(()=>{
  members += Math.random()>0.5?1:-1;
  if(members<25) members=25;
  if(members>40) members=40;

  document.getElementById("members").innerText = members;
  document.getElementById("m2").innerText = members;
},3000);

/* APPLY */
function submitApp(){

  const discord = document.getElementById("discord").value;
  const epic = document.getElementById("epic").value;
  const rank = document.getElementById("rank").value;
  const reason = document.getElementById("reason").value;

  fetch(WEBHOOK,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      content:"NEW APPLICATION",
      embeds:[{
        title:"APEX APP",
        fields:[
          {name:"Discord", value:discord},
          {name:"Epic", value:epic},
          {name:"Rank", value:rank},
          {name:"Reason", value:reason}
        ]
      }]
    })
  });

  alert("Submitted!");
}

/* PRO */
function submitPro(){

  const pdisc = document.getElementById("pdisc").value;
  const pepic = document.getElementById("pepic").value;
  const clip = document.getElementById("clip").value;

  if(!clip){
    alert("Clip required");
    return;
  }

  fetch(WEBHOOK,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      content:"PRO TRYOUT",
      embeds:[{
        title:"APEX PRO",
        fields:[
          {name:"Discord", value:pdisc},
          {name:"Epic", value:pepic},
          {name:"Clip", value:clip}
        ]
      }]
    })
  });

  alert("PRO SUBMITTED");
}

</script>

</body>
</html>
